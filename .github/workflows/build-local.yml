name: Build local APK

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-local:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Check EAS credentials
        id: credentials
        env:
          EAS_ACCESS_TOKEN: ${{ secrets.EAS_ACCESS_TOKEN }}
        run: |
          if [ -n "$EAS_ACCESS_TOKEN" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build local APK
        if: steps.credentials.outputs.available == 'true'
        env:
          EAS_ACCESS_TOKEN: ${{ secrets.EAS_ACCESS_TOKEN }}
        run: pnpm mobile:build:local

      - name: Upload local APK
        if: steps.credentials.outputs.available == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: taskpro-local-apk
          path: dist/taskpro-local.apk
          if-no-files-found: error

      - name: Report skipped build
        if: steps.credentials.outputs.available == 'false'
        run: echo "EAS_ACCESS_TOKEN is not configured; skipping local APK build."
