<script>
        // Simple micro-interaction for the "Abrir Puerta" button

        // Add a subtle drift to the map for atmospheric effect
        const mapContainer = document.querySelector('[data-location]');
        let pos = 0;
        function animateMap() {
            pos += 0.01;
            mapContainer.style.backgroundPosition = `${50 + Math.sin(pos) * 2}% ${50 + Math.cos(pos) * 2}%`;
            requestAnimationFrame(animateMap);
        }
        animateMap();
