<body class="bg-surface text-on-surface flex justify-center">
<!-- Main Canvas (Mobile Perspective) -->
<main class="w-full max-w-[450px] h-full bg-background relative flex flex-col">
<!-- TopAppBar (Transactional Mode: No Global Nav) -->
<header class="flex justify-between items-center w-full px-4 h-14 shrink-0 bg-surface custom-shadow z-50">
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container-low transition-colors">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md text-on-surface">Detalles del servicio</h1>
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container-low transition-colors">
<span class="material-symbols-outlined">notifications</span>
</button>
</header>
<!-- Scrollable Content Area -->
<div class="flex-grow overflow-y-auto hide-scrollbar">
<!-- Stepper Component -->
<section class="px-4 py-6">
<div class="flex items-center justify-between relative">
<!-- Connectors -->
<div class="absolute top-4 left-0 w-full h-[2px] bg-outline-variant -z-10"></div>
<div class="absolute top-4 left-0 w-1/2 h-[2px] bg-primary -z-10"></div>
<!-- Step 1 -->
<div class="flex flex-col items-center gap-2">
<div class="w-8 h-8 rounded-full bg-primary text-white flex items-center justify-center text-label-md font-bold">
<span class="material-symbols-outlined text-[18px]" style="font-variation-settings: 'FILL' 1;">check</span>
</div>
<span class="font-label-sm text-label-sm text-on-surface">Servicio</span>
</div>
<!-- Step 2 (Active) -->
<div class="flex flex-col items-center gap-2">
<div class="w-8 h-8 rounded-full bg-primary text-white flex items-center justify-center text-label-md font-bold">2</div>
<span class="font-label-md text-label-md text-primary font-bold">Detalles</span>
</div>
<!-- Step 3 -->
<div class="flex flex-col items-center gap-2">
<div class="w-8 h-8 rounded-full bg-outline-variant text-on-surface-variant flex items-center justify-center text-label-md">3</div>
<span class="font-label-sm text-label-sm text-on-surface-variant">Confirmar</span>
</div>
</div>
</section>
<!-- Service Summary Card -->
<section class="px-4 mb-lg">
<div class="bg-surface-container-lowest p-md rounded-xl custom-shadow flex items-center gap-md">
<div class="w-16 h-16 rounded-lg overflow-hidden flex-shrink-0">
<img class="w-full h-full object-cover" data-alt="A close-up shot of a professional electrician's tool belt with various pliers, screwdrivers, and a digital multimeter against a clean white background. The lighting is soft and even, highlighting the technical and reliable nature of the service. Corporate modernism style with teal and white accents." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAMD9VRGLofvDcjdkJfkQ-ARfKc8uY18aYTpWsfAHOzp9NjYd0R2Rm5OjLHnyCNOoLyGNW_k4JLTFSnBNqfe0bPeLQnH2F5SpMSAoGM1g1T1TXguF-WIqgeVylwXZy4fGeKzfIMg6W4oIYWn5fS9bB7kF5KqcwFY1hQ46wV5t51d04VSyarkJ6rhMnuYqD7QqbPf_WfkAoi2lbD_LIxMFr66x-BR1ztZvQLw0H_XuOzuTSt5tRpERZtxHyOTlMibAI-tBKmYFyWpQA"/>
</div>
<div class="flex-grow">
<h2 class="font-headline-md text-headline-md text-on-surface">Instalación eléctrica</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Servicio técnico certificado</p>
</div>
<button class="text-primary font-bold text-label-md px-sm py-xs rounded hover:bg-primary/5 transition-colors">Cambiar</button>
</div>
</section>
<!-- Configuration Form -->
<form class="px-4 flex flex-col gap-lg pb-10">
<!-- Address Input -->
<div class="flex flex-col gap-sm">
<label class="font-label-md text-label-md text-on-surface-variant px-1">Dirección</label>
<div class="group relative">
<div class="absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant">
<span class="material-symbols-outlined">location_on</span>
</div>
<input class="w-full h-14 pl-10 pr-4 bg-surface-container-lowest border border-border-subtle rounded-xl focus:ring-1 focus:ring-primary focus:border-primary transition-all text-body-lg font-body-lg outline-none cursor-pointer" readonly="" type="text" value="Av. Insurgentes Sur 1224, Del Valle"/>
<div class="absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant">
<span class="material-symbols-outlined">chevron_right</span>
</div>
</div>
</div>
<!-- Date and Time Selector -->
<div class="flex flex-col gap-sm">
<label class="font-label-md text-label-md text-on-surface-variant px-1">Fecha y hora</label>
<div class="bg-surface-container-lowest border border-border-subtle rounded-xl p-md flex items-center justify-between cursor-pointer hover:border-primary transition-colors">
<div class="flex items-center gap-md">
<span class="material-symbols-outlined text-primary">calendar_today</span>
<div>
<p class="font-body-lg text-body-lg text-on-surface">Sábado, 24 de mayo 2025</p>
<p class="font-label-sm text-label-sm text-on-surface-variant">10:00 AM - 12:00 PM</p>
</div>
</div>
<span class="material-symbols-outlined text-on-surface-variant">edit_calendar</span>
</div>
</div>
<!-- Additional Notes -->
<div class="flex flex-col gap-sm">
<label class="font-label-md text-label-md text-on-surface-variant px-1">Notas adicionales (opcional)</label>
<textarea class="w-full min-h-[120px] bg-surface-container-lowest border border-border-subtle rounded-xl p-md focus:ring-1 focus:ring-primary focus:border-primary transition-all text-body-lg font-body-lg outline-none resize-none" placeholder="Cuéntanos lo que necesitas..."></textarea>
<div class="flex justify-end">
<span class="font-caption text-caption text-on-surface-variant">0 / 250</span>
</div>
</div>
</form>
</div>
<!-- Fixed Bottom Action Bar -->
<div class="bg-surface-container-lowest p-4 custom-shadow z-50 rounded-t-2xl flex flex-col gap-md shrink-0">
<div class="flex justify-between items-center px-2">
<div class="flex flex-col">
<span class="font-label-sm text-label-sm text-on-surface-variant">Precio estimado</span>
<span class="font-headline-lg text-headline-lg text-on-surface">$480 <span class="text-body-md font-normal text-on-surface-variant">MXN</span></span>
</div>
<div class="flex items-center gap-xs text-on-tertiary-fixed-variant bg-tertiary-fixed px-3 py-1 rounded-full">
<span class="material-symbols-outlined text-[16px]" style="font-variation-settings: 'FILL' 1;">bolt</span>
<span class="font-label-sm text-label-sm font-bold">Express</span>
</div>
</div>
<button class="w-full h-12 bg-[#1A6E63] text-white font-headline-md rounded-xl hover:opacity-90 active:scale-95 transition-all shadow-md flex items-center justify-center gap-2" onclick="handleContinue(event)">
                Continuar
                <span class="material-symbols-outlined">arrow_forward</span>
</button>
</div>
</main>
<!-- Micro-interaction Script -->
<script>
        function handleContinue(event) {
            const btn = event.currentTarget;
            btn.innerHTML = '<div class="w-6 h-6 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>';
            setTimeout(() => {
                btn.innerHTML = '¡Guardado! <span class="material-symbols-outlined">check_circle</span>';
                btn.classList.add('bg-tertiary-container');
                setTimeout(() => {
                    location.reload(); // Simple reset simulation
                }, 1500);
            }, 1000);
        }

        // Texture Background Effect for the whole page
        const canvasBg = document.createElement('div');
        canvasBg.className = 'fixed inset-0 -z-20 bg-surface-dim opacity-30';
        canvasBg.style.backgroundImage = 'radial-gradient(#00554b 0.5px, transparent 0.5px)';
        canvasBg.style.backgroundSize = '24px 24px';
        document.body.appendChild(canvasBg);
    </script>
</body></html>
