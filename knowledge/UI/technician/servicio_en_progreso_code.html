<script>
        // Micro-interactions and Timer logic
        let seconds = 2712; // Starting at 45:12
        const timerElement = document.getElementById('timer');

        function updateTimer() {
            seconds++;
            const hrs = Math.floor(seconds / 3600);
            const mins = Math.floor((seconds % 3600) / 60);
            const secs = seconds % 60;
            
            timerElement.textContent = 
                `${hrs.toString().padStart(2, '0')}:${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        const timerInterval = setInterval(updateTimer, 1000);

        function completeService() {
            clearInterval(timerInterval);
            const overlay = document.getElementById('success-overlay');
            overlay.classList.remove('opacity-0', 'pointer-events-none');
            overlay.classList.add('opacity-100');
        }

        function resetUI() {
            const overlay = document.getElementById('success-overlay');
            overlay.classList.add('opacity-0', 'pointer-events-none');
            overlay.classList.remove('opacity-100');
            // Mocking return to home
            console.log("Navigating to home...");
        }

        // Checklist interactivity
        document.querySelectorAll('input[type="checkbox"]').forEach(checkbox => {
            checkbox.addEventListener('change', (e) => {
                const label = e.target.closest('label');
                const span = label.querySelector('span');
                if (e.target.checked) {
                    label.classList.add('border-primary-fixed');
                    span.classList.add('line-through', 'text-on-surface-variant');
                } else {
                    label.classList.remove('border-primary-fixed');
                    span.classList.remove('line-through', 'text-on-surface-variant');
                }
            });
        });
    </script>
