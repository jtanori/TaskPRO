        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 48;

        .success-checkmark-animate {
            animation: scaleIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
        }
        @keyframes scaleIn {
            from { transform: scale(0); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .confetti-slow {
            animation: fall 3s linear infinite;
        }
        @keyframes fall {
            to { transform: translateY(100vh) rotate(360deg); }
        }
    </style>

<body class="bg-surface text-on-surface font-body-md overflow-x-hidden">
<!-- Atmospheric Background Particles -->
<div class="fixed inset-0 pointer-events-none z-0 overflow-hidden" id="confetti-container"></div>
<main class="relative z-10 min-h-screen flex flex-col items-center justify-center px-margin-mobile py-lg">
<!-- Success Content Container -->
<div class="w-full max-w-md bg-surface-container-lowest rounded-xl shadow-[0px_2px_8px_rgba(0,0,0,0.05)] p-lg flex flex-col items-center text-center">
<!-- Icon/Visual Section -->
<div class="relative mb-lg">
<div class="w-24 h-24 bg-tertiary-fixed rounded-full flex items-center justify-center success-checkmark-animate shadow-md">
<span class="material-symbols-outlined text-tertiary text-[48px] font-bold" style="font-variation-settings: 'wght' 700;">check</span>
</div>
<!-- Sparkle effect -->
<div class="absolute -top-2 -right-2 text-status-warning">
<span class="material-symbols-outlined text-[24px]" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
</div>
</div>
<!-- Headline -->
<h1 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-primary mb-sm">
                ¡Servicio Completado!
            </h1>
<p class="font-body-md text-body-md text-text-secondary mb-xl">
                Has finalizado con éxito la tarea de mantenimiento eléctrico residencial.
            </p>
<!-- Earnings Card -->
<div class="w-full bg-surface-container-low rounded-lg p-md mb-xl border border-border-subtle">
<div class="flex justify-between items-center mb-xs">
<span class="font-label-md text-label-md text-text-secondary">Ganancia del servicio</span>
<span class="font-headline-md text-headline-md text-tertiary-container">$85.00 USD</span>
</div>
<div class="flex justify-between items-center">
<span class="font-label-sm text-label-sm text-outline">ID de Transacción</span>
<span class="font-label-sm text-label-sm text-outline">#TP-98234-X</span>
</div>
</div>
<!-- Service Summary Image (Asymmetric Bento style teaser) -->

<div class="h-32 rounded-lg bg-cover bg-center overflow-hidden" data-alt="A professional high-angle close-up shot of a modern residential electrical panel with neatly organized wires and circuit breakers. The lighting is bright and clean, emphasizing a task-pro tech environment. The color palette features neutral grays and professional teals, consistent with a modern corporate service application." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuDMIbOyJB3oDtTXWFNy9TVAv457Y96QAiB4iapZN690YXj30qOLf5XfdlUKgZzFXm-qalUf-SAQkjkrtn8MmnaEZiZtTjPshr4_DkusI6KTNee92OGjP62tPEXJ10klKpLzebqBt1PxBUg0LaJTVwdxi2zuDyBL2kPtSGAGlm-yz0Nj4D_dhtsp7u9gwcQKrH9OGp4nJSnvzvWcnQmUOFxnddarQ-gITg2pOSDaIHM6Gr4S7OJtRJlCRSfFTbaZoN6Bted_Au5eVNw')"></div>
<div class="flex flex-col gap-sm">
<div class="flex-1 bg-primary-container rounded-lg flex flex-col justify-center items-start px-md text-on-primary-container">
<span class="text-label-sm font-label-sm opacity-80">Tiempo total</span>
<span class="text-headline-md font-headline-md leading-tight">1h 45m</span>
</div>
<div class="flex-1 bg-secondary-container rounded-lg flex flex-col justify-center items-start px-md text-on-secondary-container">
<span class="text-label-sm font-label-sm opacity-80">Calificación</span>
<div class="flex items-center gap-xs">
<span class="text-headline-md font-headline-md">5.0</span>
<span class="material-symbols-outlined text-[16px]" style="font-variation-settings: 'FILL' 1;">star</span>
</div>
</div>
</div>
</div>
<!-- Action Buttons -->
<div class="w-full flex flex-col gap-md">
<button class="w-full h-12 bg-primary text-on-primary font-label-md text-label-md rounded-lg shadow-sm hover:opacity-90 active:scale-95 transition-all flex items-center justify-center gap-sm" onclick="window.location.reload()">
                    Ver Siguiente Tarea
                    <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
<button class="w-full h-12 bg-surface-container-high text-primary font-label-md text-label-md rounded-lg hover:bg-surface-variant transition-colors flex items-center justify-center">
                    Ir al Inicio
                </button>
</div>
<!-- Feedback prompt -->
<p class="mt-xl font-label-sm text-label-sm text-outline cursor-pointer hover:text-primary transition-colors">
                ¿Algún problema con este servicio? Reportar aquí.
            </p>
</div>
</main>
<script>
        // Simple micro-interaction for confetti
        function createConfetti() {
            const container = document.getElementById('confetti-container');
            const colors = ['#00554b', '#1a6e63', '#83fc8e', '#FFC107'];
            for (let i = 0; i < 40; i++) {
                const confetti = document.createElement('div');
                confetti.classList.add('confetti-slow', 'absolute');
                confetti.style.width = Math.random() * 8 + 4 + 'px';
                confetti.style.height = Math.random() * 8 + 4 + 'px';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.top = '-20px';
                confetti.style.borderRadius = '2px';
                confetti.style.animationDelay = Math.random() * 3 + 's';
                confetti.style.opacity = Math.random();
                container.appendChild(confetti);
            }
        }
        createConfetti();

        // Simulate interaction
        document.querySelectorAll('button').forEach(button => {
            button.addEventListener('mousedown', () => {
                button.classList.add('opacity-80');
            });
            button.addEventListener('mouseup', () => {
                button.classList.remove('opacity-80');
            });
        });
    </script>
