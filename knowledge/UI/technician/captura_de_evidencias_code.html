<body class="bg-background text-on-surface min-h-screen flex flex-col font-body-md">

<main class="flex-1 mt-14 mb-24 px-margin-mobile py-lg max-w-2xl mx-auto w-full">
<section class="space-y-lg">
<!-- Header Section -->
<div class="space-y-xs">
<h1 class="text-headline-lg-mobile font-headline-lg-mobile text-text-primary">Captura de Evidencia</h1>
<p class="text-body-md text-text-secondary">Documenta el estado del servicio para validación del cliente.</p>
</div>
<!-- Evidence Tabs / Grid Layout -->
<div class="space-y-xl">
<!-- BEFORE PHOTOS -->
<div class="space-y-md">
<div class="flex justify-between items-center">
<h2 class="text-label-md font-label-md uppercase tracking-wider text-on-surface-variant">Fotos: Antes</h2>
<span class="text-caption font-caption text-primary">Obligatorio</span>
</div>
<div class="grid grid-cols-2 gap-md">
<!-- Filled State Example -->
<div class="relative aspect-square rounded-xl overflow-hidden shadow-sm bg-surface-container-low group">
<img class="w-full h-full object-cover" data-alt="A close-up shot of a faulty electrical panel with loose wiring, taken as 'before' evidence for a repair job. The lighting is bright and clear, highlighting the technical issue. The image has a professional, documentary feel with a clean, high-resolution aesthetic consistent with a service technician app." src="https://lh3.googleusercontent.com/aida-public/AB6AXuD8tanSrbk_Z3zNusUtR-hchesbmPMQDnOTqKPEXPZ9lAbjb_p5vHFlpYbA_s1KIUmUhqMKRxv7b9Y2-p4vX8jMJ39JK7bJWQmQmu0qwUyOBpsSqx0KHTMUMDCn7gqZWpGSyid2acM7r5Bf0G_Ksqo-kFv2RMm5JMZkQ078VX2kHe72f4wF_cK3MBtmdtqivJZuj8FGX_AUieN2_ALwOl5yIMxessI2FUMT0xcPe2TnofUks7KTd2SRLuRE_RQmld2hoiRh8obQUPg"/>

</div>
</div>
<!-- Empty State Slot -->
<button class="photo-slot-dashed aspect-square flex flex-col items-center justify-center gap-xs text-on-surface-variant hover:bg-surface-container transition-colors rounded-xl">
<span class="material-symbols-outlined text-[32px]">add_a_photo</span>
<span class="text-label-sm font-label-sm">Tomar Foto</span>
</button>
</div>
<button class="w-full h-[48px] border-2 border-primary text-primary font-label-md rounded-xl flex items-center justify-center gap-sm active:scale-95 transition-transform">

                        Tomar Foto (Antes)
                    </button>

<!-- AFTER PHOTOS -->

<div class="grid grid-cols-2 gap-md">

<div class="absolute bottom-3 right-3 text-caption font-caption text-outline">

<span class="material-symbols-outlined">account_circle</span>
<span class="text-label-sm font-label-sm">Profile</span>
</div>
</nav>
<script>
        // Simple character count logic for the textarea
        const textarea = document.getElementById('observations');
        const counter = textarea.nextElementSibling;
        
        textarea.addEventListener('input', (e) => {
            const count = e.target.value.length;
            counter.textContent = `${count} / 250`;
            if (count > 250) {
                counter.classList.add('text-error');
            } else {
                counter.classList.remove('text-error');
            }
        });

        // Simulating haptic feedback on large buttons
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('touchstart', () => {
                if (window.navigator.vibrate) window.navigator.vibrate(5);
            });
        });
    </script>
