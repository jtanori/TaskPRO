<!-- Registration Form -->

</div>
</div>
<!-- Email -->
<div class="space-y-xs">
<label class="font-label-md text-label-md text-on-surface-variant">Correo electrónico</label>
<div class="relative flex items-center border border-border-subtle rounded-lg bg-surface-container-lowest border-teal-focus transition-all h-12 px-md">
<span class="material-symbols-outlined text-outline mr-sm" data-icon="mail">mail</span>
<input class="bg-transparent border-none focus:ring-0 w-full font-body-md text-body-md text-on-surface placeholder:text-outline-variant" placeholder="nombre@ejemplo.com" type="email"/>
</div>
</div>
<!-- Phone +52 Mask -->
<div class="space-y-xs">
<label class="font-label-md text-label-md text-on-surface-variant">Número de teléfono</label>
<div class="relative flex items-center border border-border-subtle rounded-lg bg-surface-container-lowest border-teal-focus transition-all h-12 px-md">

<span class="material-symbols-outlined text-outline ml-sm" data-icon="phone_iphone">phone_iphone</span>
</div>
</div>
<!-- Password -->
<div class="space-y-xs">
<label class="font-label-md text-label-md text-on-surface-variant">Contraseña</label>
<div class="relative flex items-center border border-border-subtle rounded-lg bg-surface-container-lowest border-teal-focus transition-all h-12 px-md">

<script>
        // Micro-interaction for password visibility
        document.querySelector('[data-icon="visibility"]').addEventListener('click', function() {
            const input = this.previousElementSibling;
            if (input.type === 'password') {
                input.type = 'text';
                this.textContent = 'visibility_off';
            } else {
                input.type = 'password';
                this.textContent = 'visibility';
            }
        });

        // Simple form validation visual feedback
        const form = document.querySelector('form');
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            const originalContent = btn.innerHTML;
            
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin" data-icon="progress_activity">progress_activity</span>';
            btn.disabled = true;

            setTimeout(() => {
                btn.innerHTML = originalContent;
                btn.disabled = false;
                alert('¡Registro simulado con éxito!');
            }, 1500);
        });
    </script>
